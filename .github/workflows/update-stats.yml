name: Oppdater statistikk fra NFF

on:
  schedule:
    # 02:00 UTC ≈ 03:00 Norge (vintertid). Juster ved behov.
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installer og sync
        run: |
          npm ci
          npm run sync:data

      - name: Commit og push ved endring
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/stats.json
          if git diff --staged --quiet; then
            echo "Ingen endring i stats."
          else
            git commit -m "chore: oppdater stats fra NFF [automated]"
            git push
          fi
